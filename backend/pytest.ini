[pytest]
asyncio_mode = auto
# Bare `pytest` (the console script CI uses) does not add the invocation
# CWD to sys.path — only `python -m pytest` does. Without this, test
# modules importing `services.*` / `models.*` / `config` fail with
# ModuleNotFoundError in CI while passing locally.
pythonpath = .
markers =
    asyncio: mark a test as async (handled by pytest-asyncio)
testpaths = tests
filterwarnings =
    # Third-party noise only — keep deprecations from our own code visible.
    ignore:The 'strip_cdata' option of HTMLParser\(\) has never done anything:DeprecationWarning:bs4.builder._lxml
