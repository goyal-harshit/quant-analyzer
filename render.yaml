services:
  - type: web
    name: quant-analyzer-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quant-analyzer-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://goyal-harshit.github.io
      - key: REDIS_URL
        value: ""
      - key: OLLAMA_HOST
        value: ""
      - key: FRED_API_KEY
        value: ""

databases:
  - name: quant-analyzer-db
    databaseName: quantai_db
    user: quantai
    plan: free
