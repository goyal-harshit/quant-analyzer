name: CI

# Quality gates that run before the deploy workflows. Backend: ruff lint,
# Alembic migration up/down check, and the pytest suite (unit + auth
# integration, against an ephemeral SQLite DB). Frontend: type-check +
# production build + Playwright E2E against the static export.
# Keeps "runs on my machine" honest.

on:
  push:
    branches: [master, dev]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          # 3.11 is what's actually verified locally (backend/.venv). The prod
          # image runs 3.12 (Dockerfile); bumping this needs its own
          # verification pass before switching, since alembic upgrade/downgrade
          # failed under 3.12 here (untested combination of pinned deps).
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff aiosqlite

      - name: Lint (ruff safety-net gate)
        run: ruff check .

      - name: Verify Alembic migrations apply on a fresh DB
        env:
          DATABASE_URL: sqlite+aiosqlite:///./migration_check.db
        run: |
          alembic upgrade head
          alembic downgrade base
          rm -f migration_check.db

      - name: Run tests
        env:
          # Ephemeral SQLite — database.py supports a SQLite variant, so the
          # suite (including the auth integration flow) runs without a DB service.
          DATABASE_URL: sqlite+aiosqlite:///./test_ci.db
        run: pytest -q

  frontend:
    name: Frontend (type-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check + build
        env:
          # next build type-checks the whole project and fails on TS errors.
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E (public + guest flows, no backend)
        # Serves the static export from `out/`; exercises landing, login form and
        # guest navigation. The authenticated flow self-skips without E2E_BACKEND.
        run: npm run test:e2e
